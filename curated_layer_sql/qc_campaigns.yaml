tests:
  no_nulls: &no_nulls
    test: no_nulls
    frequency: daily
    data_quality_dimension: completeness
  column_tests:
    - column: country_code
      tests:
        - <<: *no_nulls
    - column: global_entity_id
      tests:
        - <<: *no_nulls
    - column: campaign_id
      tests:
        - <<: *no_nulls
  table_tests:
    - test: no_duplicates
      frequency: daily
      data-quality-dimension: uniqueness
      params:
        columns:
          - country_code
          - campaign_id
